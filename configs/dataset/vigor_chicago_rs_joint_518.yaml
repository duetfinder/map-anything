        remote_crop_scale_range=${dataset.vigor_chicago_joint_rs_aerial.train.remote_crop_scale_range},
        remote_image_resize_mode='${dataset.vigor_chicago_joint_rs_aerial.train.remote_image_resize_mode}',
        remote_label_resize_mode='${dataset.vigor_chicago_joint_rs_aerial.train.remote_label_resize_mode}')"
    split: 'train'
    dataset_resolution: ${dataset.resolution_train}
    principal_point_centered: ${dataset.principal_point_centered}
    aug_crop: 16
    transform: 'colorjitter+grayscale+gaublur'
    data_norm_type: ${model.data_norm_type}
    ROOT: ${root_data_dir}/Crossview_wai
    dataset_metadata_dir: ${mapanything_dataset_metadata_dir}/Crossview
    overfit_num_sets: null
    variable_num_views: ${dataset.train.variable_num_views}
    num_views: ${dataset.num_views}
    covisibility_thres: 0.05
    remote_ROOT: ${root_data_dir}/Crossview_rs
    remote_providers: ['Google_Satellite']
    remote_provider_sampling_mode: 'first_available'
    remote_resolution: ${dataset.resolution_train}
    remote_transform: 'imgnorm'
    skip_missing_remote: false
    remote_crop_mode: 'none'
    remote_crop_scale_range: [1.0, 1.0]
    remote_image_resize_mode: 'nearest'

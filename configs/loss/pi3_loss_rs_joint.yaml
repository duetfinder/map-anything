remote_pointmap_loss_weight: 0.1
remote_height_loss_weight: 0.0
test_remote_pointmap_loss_weight: ${loss.remote_pointmap_loss_weight}
test_remote_height_loss_weight: 0.0

train_criterion: >
  JointAerialRSLoss(
    aerial_criterion=ExcludeTopNPercentPixelLoss(
      FactoredGeometryRegr3DPlusNormalGMLoss(
        RobustRegressionLoss(alpha=0.5, scaling_c=0.05),
        norm_mode='avg_dis',
        depth_type_for_loss='depth_z',
        loss_in_log=True,
        flatten_across_image_only=True,
        compute_pairwise_relative_pose_loss=True,
        convert_predictions_to_view0_frame=True,
        compute_world_frame_points_loss=True,
        apply_normal_and_gm_loss_to_synthetic_data_only=True,
        normal_loss_weight=3.0,
        gm_loss_weight=3.0
      ),
      top_n_percent=5,
      apply_to_real_data_only=True,
      loss_set_indices=[0, 1, 2]
    ),
    remote_criterion=RSPointmapHeightLoss(
      pointmap_criterion=L1Loss(reduction='none'),
      height_criterion=L1Loss(reduction='none'),
      pointmap_loss_weight=${loss.remote_pointmap_loss_weight},
      height_loss_weight=${loss.remote_height_loss_weight},
      compare_in_view0_frame=True
    )
  )
test_criterion: >
  JointAerialRSLoss(
    aerial_criterion=ExcludeTopNPercentPixelLoss(
      FactoredGeometryRegr3DPlusNormalGMLoss(
        RobustRegressionLoss(alpha=0.5, scaling_c=0.05),
        norm_mode='avg_dis',
        depth_type_for_loss='depth_z',
        loss_in_log=True,
        flatten_across_image_only=True,
        compute_pairwise_relative_pose_loss=True,
        convert_predictions_to_view0_frame=True,
        compute_world_frame_points_loss=True,
        apply_normal_and_gm_loss_to_synthetic_data_only=True,
        normal_loss_weight=3.0,
        gm_loss_weight=3.0
      ),
      top_n_percent=5,
      apply_to_real_data_only=True,
      loss_set_indices=[0, 1, 2]
    ),
    remote_criterion=RSPointmapHeightLoss(
      pointmap_criterion=L1Loss(reduction='none'),
      height_criterion=L1Loss(reduction='none'),
      pointmap_loss_weight=${loss.test_remote_pointmap_loss_weight},
      height_loss_weight=${loss.test_remote_height_loss_weight},
      compare_in_view0_frame=True
    )
  )
